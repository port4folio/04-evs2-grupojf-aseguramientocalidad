<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Licencias Médicas - Seguridad LTDA</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="principal.html">
                <i class="bi bi-shield-lock-fill text-success"></i> Seguridad LTDA
            </a>
            <a href="portalEmpleado.html" class="btn btn-outline-light btn-sm">
                <i class="bi bi-arrow-left-circle-fill"></i> Volver al Portal
            </a>
        </div>
    </nav>
    <main class="container mt-5 mb-5">
        <section class="shadow p-5 bg-white rounded">
            <div class="text-center mb-5">
                <h1 class="display-5">Licencias Médicas</h1>
                <p class="lead text-muted">
                    Registro y seguimiento de licencias médicas del personal.
                </p>
            </div>
            <form>
                <div class="row g-4">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Nombre del Trabajador</label>
                        <input type="text" class="form-control" placeholder="Ingrese nombre completo">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">RUT</label>
                        <input type="text" class="form-control" placeholder="12.345.678-9">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Tipo de Licencia</label>
                        <select class="form-select">
                            <option selected>Seleccione tipo</option>
                            <option>Licencia Común</option>
                            <option>Accidente Laboral</option>
                            <option>Licencia Maternal</option>
                            <option>Reposo Preventivo</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Estado</label>
                        <select class="form-select">
                            <option selected>Seleccione estado</option>
                            <option>Aprobada</option>
                            <option>Rechazada</option>
                            <option>En Revisión</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Fecha de Inicio</label>
                        <input type="date" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Fecha de Término</label>
                        <input type="date" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Centro Médico</label>
                        <input type="text" class="form-control" placeholder="Ingrese centro médico">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Médico Tratante</label>
                        <input type="text" class="form-control" placeholder="Ingrese nombre del médico">
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-bold">Observaciones</label>
                        <textarea class="form-control" rows="4" placeholder="Ingrese observaciones"></textarea>
                    </div>
                </div>
                <div class="text-center mt-5">
                    <button type="submit" class="btn btn-success px-4 me-2">
                        <i class="bi bi-heart-pulse-fill"></i> Registrar Licencia
                    </button>
                    <a href="portalEmpleado.html" class="btn btn-secondary px-4">
                        <i class="bi bi-arrow-left-circle-fill"></i> Volver
                    </a>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
