<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contratos y Finiquitos - Seguridad LTDA</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/estilos.css">
    <script src="js/script.js"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="principal.html">
                <i class="bi bi-shield-lock-fill text-success"></i> Seguridad LTDA
            </a>
            <a href="portalEmpleado.html" class="btn btn-outline-light btn-sm">
                <i class="bi bi-arrow-left-circle-fill"></i> Volver al Portal
            </a>
        </div>
    </nav>
    <main class="container mt-5 mb-5">
        <section class="shadow p-5 bg-white rounded">
            <div class="text-center mb-5">
                <h1 class="display-5">Contratos y Finiquitos</h1>
                <p class="lead text-muted">
                    Gestión y generación de contratos laborales y documentos de finiquito del personal.
                </p>
            </div>
            <form>
                <div class="row g-4">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Nombre del Trabajador</label>
                        <input type="text" class="form-control" placeholder="Ingrese nombre completo">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">RUT</label>
                        <input type="text" class="form-control" placeholder="12.345.678-9">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Cargo</label>
                        <input type="text" class="form-control" placeholder="Ingrese cargo">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Departamento</label>
                        <input type="text" class="form-control" placeholder="Ingrese departamento">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Tipo de Documento</label>
                        <select class="form-select">
                            <option selected>Seleccione una opción</option>
                            <option>Contrato</option>
                            <option>Finiquito</option>
                            <option>Anexo de Contrato</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Fecha de Emisión</label>
                        <input type="date" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Sueldo Base</label>
                        <input type="number" class="form-control" placeholder="Ingrese sueldo">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Tipo de Contrato</label>
                        <select class="form-select">
                            <option selected>Seleccione tipo</option>
                            <option>Indefinido</option>
                            <option>Plazo Fijo</option>
                            <option>Part Time</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-bold">Observaciones</label>
                        <textarea class="form-control" rows="4" placeholder="Ingrese observaciones"></textarea>
                    </div>
                </div>
                <div class="text-center mt-5">
                    <button type="submit" class="btn btn-success px-4 me-2">
                        <i class="bi bi-file-earmark-text-fill"></i> Generar Documento
                    </button>
                    <a href="portalEmpleado.html" class="btn btn-secondary px-4">
                        <i class="bi bi-arrow-left-circle-fill"></i> Volver
                    </a>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
