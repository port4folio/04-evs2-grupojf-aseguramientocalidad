<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitud de Anticipos - Seguridad LTDA</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/estilos.css">
    <script src="js/script.js" defer></script>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">

        <div class="container">

            <a class="navbar-brand" href="principal.html">
                <i class="bi bi-shield-lock-fill text-success"></i>
                Seguridad LTDA
            </a>

            <a href="portalEmpleado.html" class="btn btn-outline-light btn-sm">
                <i class="bi bi-arrow-left-circle-fill"></i>
                Volver al Portal
            </a>

        </div>

    </nav>

    <main class="container mt-5 mb-5">

        <section class="shadow p-5 bg-white rounded">

            <div class="text-center mb-5">

                <h1 class="display-5">
                    Solicitud de Anticipos
                </h1>

                <p class="lead text-muted">
                    Solicita un anticipo de sueldo indicando monto y motivo.
                </p>

            </div>

            <form>

                <div class="row g-4">

                    <div class="col-md-6">

                        <label class="form-label fw-bold">
                            Nombre del Trabajador
                        </label>

                        <input type="text" class="form-control" placeholder="Ingrese nombre completo">

                    </div>

                    <div class="col-md-6">

                        <label class="form-label fw-bold">
                            RUT
                        </label>

                        <input type="text" class="form-control" placeholder="Ej: 12.345.678-9">

                    </div>

                    <div class="col-md-6">

                        <label class="form-label fw-bold">
                            Monto Solicitado
                        </label>

                        <div class="input-group">

                            <span class="input-group-text fw-bold">
                                $
                            </span>

                            <input type="number" class="form-control" placeholder="Ingrese el monto">

                        </div>

                    </div>

                    <div class="col-md-6">

                        <label class="form-label fw-bold">
                            Fecha Solicitud
                        </label>

                        <input type="date" class="form-control">

                    </div>

                    <div class="col-12">

                        <label class="form-label fw-bold">
                            Motivo de la Solicitud
                        </label>

                        <textarea class="form-control" rows="4" placeholder="Ingrese motivo"></textarea>

                    </div>

                </div>

                <div class="text-center mt-5">

                    <button type="button" class="btn btn-success px-4 me-2" id="enviarAnticipo">

                        <i class="bi bi-cash-coin"></i>
                        Enviar Solicitud

                    </button>

                    <a href="portalEmpleado.html" class="btn btn-secondary px-4">

                        <i class="bi bi-arrow-left-circle-fill"></i>
                        Volver

                    </a>

                </div>

            </form>

        </section>

    </main>

</body>

</html>
